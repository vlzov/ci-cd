name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/todo-app

jobs:
  # ========== JOB 1: СБОРКА И ТЕСТИРОВАНИЕ ==========
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Встроенное кэширование Maven-зависимостей
          cache: 'maven'

      - name: Cache Maven dependencies (дополнительно)
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests with Maven
        run: mvn clean test

      - name: Generate JaCoCo coverage report
        run: mvn jacoco:report

      - name: Upload coverage report (опционально)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

  # ========== JOB 2: СБОРКА DOCKER-ОБРАЗА ==========
  build-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-app-jar
          path: target/*.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== JOB 3: ДЕПЛОЙ НА ВИРТУАЛЬНУЮ МАШИНУ ==========
  deploy:
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script: |
            # Обновление systemd-сервиса
            echo "🚀 Начинаем деплой..."

            # Переходим в директорию приложения
            cd /opt/todo-app || { echo "❌ Директория не найдена"; exit 1; }

            # Сохраняем предыдущую версию для быстрого отката
            if [ -f app.jar ]; then
              cp app.jar app.jar.backup
            fi

            # Логинимся в Docker Hub и скачиваем новый образ
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            # Останавливаем текущий контейнер
            docker stop todo-app || true
            docker rm todo-app || true

            # Запускаем новый контейнер
            docker pull ${{ env.DOCKER_IMAGE_NAME }}:latest
            docker run -d \
              --name todo-app \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ env.DOCKER_IMAGE_NAME }}:latest

            # Проверяем, что контейнер запущен
            sleep 5
            if docker ps | grep -q todo-app; then
              echo "✅ Деплой успешно завершён!"
              docker logout
            else
              echo "❌ Ошибка: контейнер не запустился. Восстанавливаем предыдущую версию..."
              docker run -d \
                --name todo-app \
                --restart unless-stopped \
                -p 8080:8080 \
                ${{ env.DOCKER_IMAGE_NAME }}:previous || true
              exit 1
            fi

  # ========== JOB 4: УВЕДОМЛЕНИЕ О РЕЗУЛЬТАТЕ ==========
  notify:
    needs: [build-and-test, build-docker, deploy]
    runs-on: ubuntu-latest
    if: always()  # Запускается всегда, даже если предыдущие джобы упали

    steps:
      - name: Send notification to Slack
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: deployments
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: "CI/CD Pipeline Result"
          SLACK_MESSAGE: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Status: ${{ job.status }}
            Author: ${{ github.actor }}
          SLACK_FOOTER: "GitHub Actions"
        if: env.SLACK_WEBHOOK != ''