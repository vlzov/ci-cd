name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/todo-app

jobs:
  # ========== JOB 1: СБОРКА И ТЕСТИРОВАНИЕ ==========
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests with Maven
        run: mvn clean test

      - name: Generate JaCoCo coverage report
        run: mvn jacoco:report

      - name: Check coverage threshold
        run: |
          COVERAGE=$(grep -oP 'Total.*?([0-9]+)%' target/site/jacoco/index.html | grep -oP '[0-9]+' | head -1)
          echo "Coverage: $COVERAGE%"
          if [ "$COVERAGE" -lt 70 ]; then
            echo "❌ Coverage is below 70%"
            exit 1
          fi
          echo "✅ Coverage is $COVERAGE%"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  # ========== JOB 2: СБОРКА DOCKER-ОБРАЗА ==========
  build-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-app-jar
          path: target/*.jar
          retention-days: 7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=${{ github.sha }}
            VCS_REF=${{ github.sha }}

  # ========== JOB 3: ДЕПЛОЙ НА ВИРТУАЛЬНУЮ МАШИНУ ==========
  deploy:
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://${{ secrets.VM_HOST }}:8080

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script_stop: true
          script: |
            set -e  # Остановка при любой ошибке
            
            echo "🚀 Начинаем деплой..."
            echo "📦 Образ: ${{ env.DOCKER_IMAGE_NAME }}:latest"
            echo "🔧 Коммит: ${{ github.sha }}"
            
            # Создаём директорию, если её нет
            sudo mkdir -p /opt/todo-app
            sudo chown -R $USER:$USER /opt/todo-app
            cd /opt/todo-app
            
            # Создаём docker-compose.yml если его нет
            if [ ! -f docker-compose.yml ]; then
              echo "📝 Создаём docker-compose.yml..."
              cat > docker-compose.yml << 'EOF'
            version: '3.8'
            
            services:
              todo-app:
                image: ${DOCKER_IMAGE}
                container_name: todo-app
                restart: unless-stopped
                ports:
                  - "8080:8080"
                environment:
                  - SPRING_PROFILES_ACTIVE=prod
                  - JAVA_OPTS=-Xmx256m -Xms128m
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s
                volumes:
                  - ./logs:/app/logs
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
            EOF
            fi
            
            # Логинимся в Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Останавливаем и удаляем старый контейнер
            echo "🛑 Останавливаем старый контейнер..."
            docker-compose down || true
            
            # Удаляем старые образы
            echo "🧹 Очистка старых образов..."
            docker system prune -f
            
            # Загружаем новый образ
            echo "⬇️ Загружаем новый образ..."
            docker pull ${{ env.DOCKER_IMAGE_NAME }}:latest
            
            # Запускаем новый контейнер
            echo "🚀 Запускаем новый контейнер..."
            DOCKER_IMAGE=${{ env.DOCKER_IMAGE_NAME }}:latest docker-compose up -d
            
            # Ждём запуска
            echo "⏳ Ждём запуска приложения..."
            sleep 10
            
            # Проверяем здоровье
            echo "🏥 Проверяем здоровье приложения..."
            for i in {1..10}; do
              if curl -s -f http://localhost:8080/actuator/health > /dev/null; then
                echo "✅ Приложение запущено и работает!"
                break
              fi
              echo "⏳ Ожидание... ($i/10)"
              sleep 5
            done
            
            # Финальная проверка
            if docker ps | grep -q todo-app; then
              echo "✅ Деплой успешно завершён!"
              echo "🌐 Приложение доступно по адресу: http://${{ secrets.VM_HOST }}:8080"
              docker-compose logs --tail=20
            else
              echo "❌ Ошибка: контейнер не запустился"
              docker-compose logs
              exit 1
            fi
            
            # Выход из Docker Hub
            docker logout

      - name: Verify deployment
        run: |
          echo "🔍 Проверяем доступность приложения..."
          sleep 5
          for i in {1..5}; do
            if curl -s -f http://${{ secrets.VM_HOST }}:8080/actuator/health > /dev/null; then
              echo "✅ Приложение доступно!"
              curl -s http://${{ secrets.VM_HOST }}:8080/actuator/health
              exit 0
            fi
            echo "⏳ Попытка $i/5..."
            sleep 10
          done
          echo "❌ Приложение недоступно"
          exit 1

  # ========== JOB 4: ОТКАТ В СЛУЧАЕ ОШИБКИ ==========
  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Rollback deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script: |
            echo "⚠️ Выполняется откат..."
            cd /opt/todo-app
            
            # Останавливаем текущий контейнер
            docker-compose down || true
            
            # Запускаем предыдущую версию
            PREVIOUS_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep todo-app | head -2 | tail -1)
            if [ ! -z "$PREVIOUS_IMAGE" ]; then
              echo "📦 Откат к образу: $PREVIOUS_IMAGE"
              DOCKER_IMAGE=$PREVIOUS_IMAGE docker-compose up -d
            else
              echo "❌ Нет предыдущего образа для отката"
              exit 1
            fi

  # ========== JOB 5: УВЕДОМЛЕНИЕ О РЕЗУЛЬТАТЕ ==========
  notify:
    needs: [build-and-test, build-docker, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Set deployment status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "status=✅ УСПЕШНО" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=❌ ОШИБКА" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Send notification to Slack
        uses: rtCamp/action-slack-notify@v2
        if: env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: deployments
          SLACK_COLOR: ${{ steps.status.outputs.color }}
          SLACK_TITLE: "CI/CD Pipeline - ${{ steps.status.outputs.status }}"
          SLACK_MESSAGE: |
            *Репозиторий:* ${{ github.repository }}
            *Ветка:* ${{ github.ref_name }}
            *Коммит:* ${{ github.sha }}
            *Автор:* ${{ github.actor }}
            *Сообщение:* ${{ github.event.head_commit.message }}
            *Статус сборки:* ${{ needs.build-and-test.result }}
            *Статус Docker:* ${{ needs.build-docker.result }}
            *Статус деплоя:* ${{ needs.deploy.result }}
            *URL:* http://${{ secrets.VM_HOST }}:8080
          SLACK_FOOTER: "GitHub Actions • $(date +'%Y-%m-%d %H:%M:%S')"

      - name: Send notification to Telegram (опционально)
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 CI/CD Pipeline завершён
            
            📦 Проект: ${{ github.repository }}
            🌿 Ветка: ${{ github.ref_name }}
            📝 Коммит: ${{ github.sha }}
            👤 Автор: ${{ github.actor }}
            
            📊 Результаты:
            • Сборка и тесты: ${{ needs.build-and-test.result }}
            • Docker образ: ${{ needs.build-docker.result }}
            • Деплой: ${{ needs.deploy.result }}
            
            🌐 URL: http://${{ secrets.VM_HOST }}:8080